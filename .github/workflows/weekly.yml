name: weekly-crsec

on:
  schedule:
    - cron: '0 2 * * 6'  # UTC（每周六02:00）
  workflow_dispatch:     # 允许手动触发

permissions:
  contents: write        # 允许提交 history.txt 到主分支
  pages: write           # 允许部署到 GitHub Pages
  id-token: write        # GitHub Pages 部署所需的身份验证

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Show Chrome
        run: |
         which google-chrome || true
         which chromium || true
         google-chrome --version || true

      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip
         pip install playwright beautifulsoup4
         playwright install chromium

      - name: Run monitor script
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python main.py
      
      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: debug-files
          path: |
            page_load.png
            after_tab_click.png
            debug_page.html
          retention-days: 3

      - name: Save history to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.txt       
          git commit -m "Update history data" || echo "No history changes to save"
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './public'  # script 会把 index.html 生成到这个目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
